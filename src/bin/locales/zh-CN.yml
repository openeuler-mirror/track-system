
track_server:
  about: Track-System 服务器守护进程（API + 调度器）
  help:
    usage: 用法
    commands: 命令
    options: 选项
  args:
    lang: 语言（zh-CN / en-US）
    database_url: 数据库 URL
    log_level: 日志级别
  commands:
    scheduler-only:
      about: 仅运行调度器（不启动 Web 服务器）
      args:
        interval: 调度间隔（秒）
        max_concurrent: 最大并发任务数
    server:
      about: 运行 Web 服务器 + 后台调度器
      args:
        addr: 监听地址
        interval: 调度间隔（秒）
        max_concurrent: 最大并发任务数
    run-once:
      about: 执行一次调度后退出
      args:
        max_concurrent: 最大并发任务数

track_collector:
  about: 轻量化仓库元数据采集工具
  long_about: |-
    Track Collector - 独立的元数据采集工具

    支持从多个平台采集仓库元数据：
      - GitHub: 上游社区仓库
      - GitLab: 上游社区仓库（待实现）
      - Gitee: 发行版仓库
      - Gitea: 自建仓库
      - Local: 本地 Git 仓库

    采集层级：
      - L0: 上游社区仓库（commits, tags, releases）
      - L1: 发行版仓库（spec, patches, commits）
      - L2: 企业发行版仓库（spec, patches, commits）

    示例：
      track-collector collect l0 --platform github --owner nginx --repo nginx --branch master --token $GITHUB_TOKEN -o nginx-l0.json
      track-collector batch --config batch-config.yaml
  args:
    lang: 语言（zh-CN / en-US）
  commands:
    collect:
      about: 采集单个仓库元数据
      args:
        level: 采集层级（l0/l1/l2）
        platform: 平台类型
        owner: 仓库所有者（远端平台需要）
        repo: 仓库名称（远端平台需要）
        repo_path: 本地仓库路径（local 平台需要）
        branch: 分支名称
        api_url: API 地址（自建平台需要，如 Gitea）
        token: 认证 token
        limit: 采集数量限制
        output: 输出文件路径
    batch:
      about: 批量采集多个仓库
      args:
        config: 配置文件路径（YAML 格式）
        output_dir: 输出目录
  help:
    usage: 用法
    commands: 命令
    options: 选项

track_cli:
  about: Track-System CLI 客户端（仅 HTTP API）
  long_about: |-
    Track CLI - Track-System 生产级命令行客户端

    说明：
      - 这是纯客户端工具，通过 HTTP API 与 track-server 通信
      - 不再直接连接数据库
  help:
    usage: 用法
    commands: 命令
    options: 选项
    help_command: 帮助
    help_about: 显示帮助信息或指定子命令的帮助
  args:
    lang: 语言（zh-CN / en-US）
    log_level: 日志级别（debug, info, warn, error）
  commands:
    sync:
      about: 数据同步相关命令
      commands:
        run:
          about: 执行单个 tracking 的数据同步
          args:
            tracking_id: Tracking ID
            timeout: 超时时间（秒）
            continue_on_error: 失败是否继续
        run-all:
          about: 执行所有待处理的同步任务
          args:
            concurrency: 最大并发数
        batch:
          about: 批量执行指定的 tracking
          args:
            ids: Tracking ID 列表
            concurrency: 最大并发数
        wake:
          about: 唤醒调度器，立即触发调度
          args:
            tracking_id: 指定 tracking ID（可选）
        status:
          about: 显示同步状态
    snapshot:
      about: 快照管理相关命令
      commands:
        create:
          about: 创建 L2 快照
          args:
            tracking_id: Tracking ID
            tag: 快照标签
        restore:
          about: 恢复 L2 快照
          args:
            snapshot_id: Snapshot ID
            force: 是否覆盖现有数据
        list:
          about: 列出快照
          args:
            tracking_id: Tracking ID（可选）
        delete:
          about: 删除快照
          args:
            snapshot_id: Snapshot ID
    server:
      about: 服务器连接管理
      commands:
        config:
          about: 配置服务器连接
          args:
            url: 服务器 URL
            token: 认证 token
            show: 显示当前配置
        ping:
          about: 测试服务器连接
        info:
          about: 获取服务器信息
    import:
      about: 导入元数据到服务器
    package:
      about: 软件包管理（通过 API）
      commands:
        add:
          about: 添加软件包
          args:
            name: 软件包名称
            level: 优先级等级
            sync_interval: 同步间隔（如 12h, 24h）
            l0_repo: L0 仓库 URL
            description: 描述
        list:
          about: 列出所有软件包
          args:
            limit: 限制数量
        show:
          about: 显示软件包详情
          args:
            name_or_id: 软件包名称或 ID
        update:
          about: 更新软件包
          args:
            name: 软件包名称
            sync_interval: 新的同步间隔
            level: 新的优先级等级
            description: 新的描述
        remove:
          about: 删除软件包
          args:
            name: 软件包名称
            confirm: 确认删除
    tracking:
      about: 跟踪配置管理（通过 API）
      commands:
        add:
          about: 添加新的跟踪配置
          args:
            package: 软件包名称或ID（名称需存在）
            distro: 发行版ID（仅支持数字ID）
            l1_repo: L1 仓库（owner/repo、owner:repo 或完整URL）
            l1_branch: L1 分支名称
            l2_repo: L2 本地仓库路径
            l2_branch: L2 分支名称
            status: 跟踪状态（active/paused）
        list:
          about: 列出所有跟踪配置
          args:
            limit: 限制数量
            package: 按软件包过滤
            status: 按状态过滤
        show:
          about: 显示跟踪配置详情
          args:
            id: 跟踪配置 ID
        pause:
          about: 暂停跟踪
          args:
            id: 跟踪配置 ID
        resume:
          about: 恢复跟踪
          args:
            id: 跟踪配置 ID
        remove:
          about: 删除跟踪配置
          args:
            id: 跟踪配置 ID
            confirm: 确认删除
    report:
      about: 报告管理
      commands:
        list:
          about: 列出报告
          args:
            page: 页码
            page_size: 每页大小
            tracking_id: 按跟踪配置 ID 过滤
            report_type: 按报告类型过滤
        show:
          about: 显示报告详情
          args:
            id: 报告 ID
        export:
          about: 导出报告
          args:
            id: 报告 ID
            format: 导出格式（json, yaml, markdown, html）
            output: 输出文件路径
