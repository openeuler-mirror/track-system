
track_server:
  about: Track-System server daemon (API + scheduler)
  help:
    usage: Usage
    commands: Commands
    options: Options
  args:
    lang: Language (zh-CN / en-US)
    database_url: Database URL
    log_level: Log level
  commands:
    scheduler-only:
      about: Run scheduler only (no web server)
      args:
        interval: Schedule interval (seconds)
        max_concurrent: Max concurrent jobs
    server:
      about: Run web server with background scheduler
      args:
        addr: Listen address
        interval: Schedule interval (seconds)
        max_concurrent: Max concurrent jobs
    run-once:
      about: Run one scheduling round and exit
      args:
        max_concurrent: Max concurrent jobs

track_collector:
  about: Lightweight repository metadata collector
  long_about: |-
    Track Collector - standalone metadata collection tool

    Supported platforms:
      - GitHub: upstream community repositories
      - GitLab: upstream community repositories (WIP)
      - Gitee: distribution repositories
      - Gitea: self-hosted repositories
      - Local: local Git repositories

    Levels:
      - L0: upstream community (commits, tags, releases)
      - L1: distribution repos (spec, patches, commits)
      - L2: enterprise distribution repos (spec, patches, commits)

    Examples:
      track-collector collect l0 --platform github --owner nginx --repo nginx --branch master --token $GITHUB_TOKEN -o nginx-l0.json
      track-collector batch --config batch-config.yaml
  args:
    lang: Language (zh-CN / en-US)
  commands:
    collect:
      about: Collect metadata for a single repository
      args:
        level: Collection level (l0/l1/l2)
        platform: Platform type
        owner: Repository owner (remote platforms)
        repo: Repository name (remote platforms)
        repo_path: Local repository path (local platform)
        branch: Branch name
        api_url: API base URL (self-hosted platforms)
        token: Access token
        limit: Collection limit
        output: Output file path
    batch:
      about: Batch collect multiple repositories
      args:
        config: Config file path (YAML)
        output_dir: Output directory
  help:
    usage: Usage
    commands: Commands
    options: Options

track_cli:
  about: Track-System CLI client (HTTP API only)
  long_about: |-
    Track CLI - production-grade command line client for Track-System

    Notes:
      - This is a pure client tool; it communicates with track-server via HTTP API.
      - It does not connect to the database directly.
  help:
    usage: Usage
    commands: Commands
    options: Options
    help_command: help
    help_about: Print this message or the help of the given subcommand(s)
  args:
    lang: Language (zh-CN / en-US)
    log_level: Log level (debug, info, warn, error)
  commands:
    sync:
      about: Sync operations
      commands:
        run:
          about: Run sync for a specific tracking
          args:
            tracking_id: Tracking ID
            timeout: Timeout (seconds)
            continue_on_error: Continue on error
        run-all:
          about: Run sync for all pending trackings
          args:
            concurrency: Max concurrency
        batch:
          about: Run sync for multiple trackings
          args:
            ids: Tracking IDs
            concurrency: Max concurrency
        wake:
          about: Wake up scheduler to trigger immediate scheduling
          args:
            tracking_id: Tracking ID (optional)
        status:
          about: Show sync status
    snapshot:
      about: Snapshot operations
      commands:
        create:
          about: Create L2 snapshot
          args:
            tracking_id: Tracking ID
            tag: Snapshot tag
        restore:
          about: Restore L2 snapshot
          args:
            snapshot_id: Snapshot ID
            force: Overwrite existing data
        list:
          about: List snapshots
          args:
            tracking_id: Tracking ID (optional)
        delete:
          about: Delete snapshot
          args:
            snapshot_id: Snapshot ID
    server:
      about: Server connection management
      commands:
        config:
          about: Configure server connection
          args:
